<body style="margin:0;padding:0;background:#060e1a;">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ─────────────────────────────────────────────
    // SQUIGGLE API HELPER
    // Automatically uses the local proxy when on localhost,
    // or corsproxy.io when hosted on GitHub Pages / Netlify etc.
    // ─────────────────────────────────────────────
    const IS_LOCAL = location.hostname === "localhost" || location.hostname === "127.0.0.1";
    async function squiggle(query) {
      const url = IS_LOCAL
        ? `/squiggle?q=${encodeURIComponent(query)}`
        : `https://corsproxy.io/?url=${encodeURIComponent("https://api.squiggle.com.au/?q=" + query)}`;
      const r = await fetch(url);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    }

    // ─────────────────────────────────────────────
    // TEAMS — includes sq: the name Squiggle uses
    // ─────────────────────────────────────────────
    const TEAMS = [
      { id:"ADE", sq:"Adelaide",         name:"Adelaide",         short:"Crows",    color:"#002B5C", accent:"#E21937", ground:"Adelaide Oval",        lat:-34.915, lng:138.596 },
      { id:"BRI", sq:"Brisbane Lions",   name:"Brisbane",         short:"Lions",    color:"#A30046", accent:"#004B87", ground:"The Gabba",             lat:-27.486, lng:153.038 },
      { id:"CAR", sq:"Carlton",          name:"Carlton",          short:"Blues",    color:"#0E1E2D", accent:"#6699CC", ground:"Marvel Stadium",        lat:-37.816, lng:144.947 },
      { id:"COL", sq:"Collingwood",      name:"Collingwood",      short:"Pies",     color:"#000000", accent:"#FFFFFF", ground:"MCG",                   lat:-37.820, lng:144.983 },
      { id:"ESS", sq:"Essendon",         name:"Essendon",         short:"Bombers",  color:"#CC2031", accent:"#000000", ground:"Marvel Stadium",        lat:-37.816, lng:144.947 },
      { id:"FRE", sq:"Fremantle",        name:"Fremantle",        short:"Dockers",  color:"#2C3A6B", accent:"#8E1F3E", ground:"Optus Stadium",         lat:-31.951, lng:115.889 },
      { id:"GEE", sq:"Geelong",          name:"Geelong",          short:"Cats",     color:"#1C3C63", accent:"#FFFFFF", ground:"GMHBA Stadium",         lat:-38.157, lng:144.355 },
      { id:"GCS", sq:"Gold Coast",       name:"Gold Coast",       short:"Suns",     color:"#E8233B", accent:"#FFD600", ground:"People First Stadium",  lat:-27.987, lng:153.389 },
      { id:"GWS", sq:"GWS Giants",       name:"GWS Giants",       short:"Giants",   color:"#F15C22", accent:"#001C2B", ground:"ENGIE Stadium",         lat:-33.848, lng:151.004 },
      { id:"HAW", sq:"Hawthorn",         name:"Hawthorn",         short:"Hawks",    color:"#4D2004", accent:"#FBB736", ground:"MCG",                   lat:-37.820, lng:144.983 },
      { id:"MEL", sq:"Melbourne",        name:"Melbourne",        short:"Demons",   color:"#CC2031", accent:"#003B8E", ground:"MCG",                   lat:-37.820, lng:144.983 },
      { id:"NOR", sq:"North Melbourne",  name:"North Melbourne",  short:"Roos",     color:"#003494", accent:"#FFFFFF", ground:"Marvel Stadium",        lat:-37.816, lng:144.947 },
      { id:"PTA", sq:"Port Adelaide",    name:"Port Adelaide",    short:"Power",    color:"#008AAB", accent:"#000000", ground:"Adelaide Oval",         lat:-34.915, lng:138.596 },
      { id:"RIC", sq:"Richmond",         name:"Richmond",         short:"Tigers",   color:"#000000", accent:"#FFD200", ground:"MCG",                   lat:-37.820, lng:144.983 },
      { id:"STK", sq:"St Kilda",         name:"St Kilda",         short:"Saints",   color:"#ED0F05", accent:"#000000", ground:"Marvel Stadium",        lat:-37.816, lng:144.947 },
      { id:"SYD", sq:"Sydney",           name:"Sydney",           short:"Swans",    color:"#E3001B", accent:"#FFFFFF", ground:"SCG",                   lat:-33.892, lng:151.224 },
      { id:"WCE", sq:"West Coast",       name:"West Coast",       short:"Eagles",   color:"#003087", accent:"#F2A800", ground:"Optus Stadium",         lat:-31.951, lng:115.889 },
      { id:"WBD", sq:"Western Bulldogs", name:"Western Bulldogs", short:"Bulldogs", color:"#014896", accent:"#CC2031", ground:"Marvel Stadium",        lat:-37.816, lng:144.947 },
    ];
    const SQ_TO_ID = {};
    TEAMS.forEach(t => { SQ_TO_ID[t.sq] = t.id; });

    // ─────────────────────────────────────────────
    // ALL 2026 VENUES
    // ─────────────────────────────────────────────
    const ALL_VENUES = [
      { name:"MCG",                  lat:-37.820, lng:144.983 },
      { name:"Marvel Stadium",       lat:-37.816, lng:144.947 },
      { name:"Adelaide Oval",        lat:-34.915, lng:138.596 },
      { name:"Optus Stadium",        lat:-31.951, lng:115.889 },
      { name:"The Gabba",            lat:-27.486, lng:153.038 },
      { name:"SCG",                  lat:-33.892, lng:151.224 },
      { name:"GMHBA Stadium",        lat:-38.157, lng:144.355 },
      { name:"People First Stadium", lat:-27.987, lng:153.389 },
      { name:"ENGIE Stadium",        lat:-33.848, lng:151.004 },
      { name:"UTAS Stadium",         lat:-41.435, lng:147.137 },
      { name:"Ninja Stadium",        lat:-42.883, lng:147.328 },
      { name:"Manuka Oval",          lat:-35.316, lng:149.133 },
      { name:"TIO Stadium",          lat:-12.426, lng:130.845 },
      { name:"Traeger Park",         lat:-23.699, lng:133.872 },
      { name:"Norwood Oval",         lat:-34.918, lng:138.634 },
      { name:"Barossa Park",         lat:-34.566, lng:138.948 },
      { name:"Hands Oval",           lat:-33.325, lng:115.641 },
    ];
    const VENUE_MAP = {};
    ALL_VENUES.forEach(v => { VENUE_MAP[v.name] = v; });

    // Home-ground advantage bonuses
    const VENUE_ADVANTAGE = {
      "MCG":                  { teams:["CAR","COL","ESS","HAW","MEL","RIC"], bonus:55 },
      "Marvel Stadium":       { teams:["ESS","NOR","STK","WBD"],             bonus:48 },
      "Adelaide Oval":        { teams:["ADE","PTA"],                          bonus:62 },
      "Optus Stadium":        { teams:["FRE","WCE"],                          bonus:68 },
      "The Gabba":            { teams:["BRI"],                                bonus:71 },
      "SCG":                  { teams:["SYD"],                                bonus:65 },
      "GMHBA Stadium":        { teams:["GEE"],                                bonus:74 },
      "People First Stadium": { teams:["GCS"],                                bonus:69 },
      "ENGIE Stadium":        { teams:["GWS"],                                bonus:58 },
      "UTAS Stadium":         { teams:["HAW"],                                bonus:52 },
      "Ninja Stadium":        { teams:["RIC"],                                bonus:50 },
      "Manuka Oval":          { teams:["GWS"],                                bonus:44 },
    };

    const H2H_DATA = {
      "GEE-COL":0.62,"RIC-COL":0.54,"SYD-GWS":0.58,"MEL-COL":0.51,
      "BRI-GCS":0.71,"ADE-PTA":0.53,"WCE-FRE":0.61,"ESS-CAR":0.55,
      "HAW-GEE":0.48,"COL-CAR":0.67,"RIC-CAR":0.65,"MEL-ESS":0.58,
    };

    // Baseline ELO — end of 2025 season
    const BASELINE_ELO = {
      ADE:1531,BRI:1587,CAR:1468,COL:1562,ESS:1489,FRE:1511,GEE:1594,
      GCS:1432,GWS:1523,HAW:1501,MEL:1548,NOR:1441,PTA:1539,RIC:1518,
      STK:1463,SYD:1556,WCE:1487,WBD:1502,
    };

    // ─────────────────────────────────────────────
    // Squiggle venue name normaliser
    // ─────────────────────────────────────────────
    const SQ_VENUE = {
      "MCG":"MCG","Marvel Stadium":"Marvel Stadium","Docklands":"Marvel Stadium",
      "Adelaide Oval":"Adelaide Oval","Optus Stadium":"Optus Stadium",
      "Gabba":"The Gabba","The Gabba":"The Gabba",
      "SCG":"SCG","GMHBA Stadium":"GMHBA Stadium","Kardinia Park":"GMHBA Stadium",
      "Heritage Bank Stadium":"People First Stadium","People First Stadium":"People First Stadium",
      "Metricon Stadium":"People First Stadium",
      "ENGIE Stadium":"ENGIE Stadium","Giants Stadium":"ENGIE Stadium",
      "UTAS Stadium":"UTAS Stadium","University of Tasmania Stadium":"UTAS Stadium",
      "Ninja Stadium":"Ninja Stadium","Blundstone Arena":"Ninja Stadium",
      "Manuka Oval":"Manuka Oval","TIO Stadium":"TIO Stadium","Marrara Oval":"TIO Stadium",
      "Traeger Park":"Traeger Park","Norwood Oval":"Norwood Oval",
      "Barossa Park":"Barossa Park","Hands Oval":"Hands Oval",
    };
    function normaliseVenue(v) { return SQ_VENUE[v] || v || "MCG"; }

    // ─────────────────────────────────────────────
    // LIVE ELO ENGINE
    // ─────────────────────────────────────────────
    const K = 32;
    function buildLiveElo(completedGames) {
      const elo = { ...BASELINE_ELO };
      const form = {};
      TEAMS.forEach(t => { form[t.id] = []; });
      const sorted = [...completedGames].sort((a,b) => new Date(a.date) - new Date(b.date));
      sorted.forEach(g => {
        const hid = SQ_TO_ID[g.hteam], aid = SQ_TO_ID[g.ateam];
        if (!hid || !aid) return;
        const eH = 1 / (1 + Math.pow(10, ((elo[aid]||1500) - (elo[hid]||1500)) / 400));
        const sH = g.hscore > g.ascore ? 1 : g.hscore === g.ascore ? 0.5 : 0;
        elo[hid] = (elo[hid]||1500) + K * (sH - eH);
        elo[aid] = (elo[aid]||1500) + K * ((1-sH) - (1-eH));
        if (form[hid]) { form[hid].push(sH >= 1 ? 1 : 0); if (form[hid].length > 8) form[hid].shift(); }
        if (form[aid]) { form[aid].push(sH < 1 ? 1 : 0); if (form[aid].length > 8) form[aid].shift(); }
      });
      return { elo, form };
    }

    // ─────────────────────────────────────────────
    // STATS / PREDICTION
    // ─────────────────────────────────────────────
    function haversineKm(lat1,lng1,lat2,lng2) {
      const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
      const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
      return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    }
    function formScore(teamId, form) {
      const arr = form[teamId] || [];
      if (!arr.length) return 0.5;
      let s=0,w=0;
      arr.forEach((v,i)=>{ const wt=Math.pow(1.3,i); s+=v*wt; w+=wt; });
      return s/w;
    }
    function venueBonus(tid, venue) {
      const va = VENUE_ADVANTAGE[venue];
      return (va && va.teams.includes(tid)) ? va.bonus : 15;
    }
    function travelPenalty(team, venue) {
      const vd = VENUE_MAP[venue];
      if (!vd) return 0;
      return Math.min(25, haversineKm(team.lat,team.lng,vd.lat,vd.lng)/200);
    }
    function h2h(hid, aid) {
      const k1=`${hid}-${aid}`, k2=`${aid}-${hid}`;
      if (H2H_DATA[k1]) return (H2H_DATA[k1]-0.5)*20;
      if (H2H_DATA[k2]) return (0.5-H2H_DATA[k2])*20;
      return 0;
    }
    function predict(home, away, venue, elo, form, opts={}) {
      const { useH2H=true, useVenue=true, useForm=true, useTravel=true } = opts;
      let hE = elo[home.id]||1500, aE = elo[away.id]||1500;
      if (useVenue)  hE += venueBonus(home.id, venue);
      if (useH2H)    hE += h2h(home.id, away.id);
      if (useTravel) aE -= travelPenalty(away, venue);
      if (useForm) {
        hE += (formScore(home.id,form)-0.5)*60;
        aE += (formScore(away.id,form)-0.5)*60;
      }
      const diff = hE-aE;
      const hP = 1/(1+Math.pow(10,-diff/400));
      const unc = Math.sqrt(hP*(1-hP)/50)*1.96;
      return {
        homeWinProb:hP, awayWinProb:1-hP, eloDiff:diff,
        homeEloAdjusted:hE, awayEloAdjusted:aE,
        predictedMargin:diff*0.55,
        ciLow:Math.max(0,hP-unc), ciHigh:Math.min(1,hP+unc),
        factors:{
          venueBonus:useVenue?venueBonus(home.id,venue):0,
          travelPenalty:useTravel?travelPenalty(away,venue):0,
          h2hAdj:useH2H?h2h(home.id,away.id):0,
          homeForm:formScore(home.id,form), awayForm:formScore(away.id,form),
        }
      };
    }

    // ─────────────────────────────────────────────
    // UI ATOMS
    // ─────────────────────────────────────────────
    function Spinner() {
      return <div style={{display:"flex",alignItems:"center",gap:10,color:"#4d6782",fontSize:14}}>
        <div style={{width:16,height:16,border:"2px solid #1e2d42",borderTop:"2px solid #38bdf8",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
        Loading live data…
      </div>;
    }
    function FormDots({ teamId, form }) {
      const arr = (form&&form[teamId])||[];
      return <div style={{display:"flex",gap:4,alignItems:"center"}}>
        {arr.length===0
          ? <span style={{fontSize:11,color:"#2d4258"}}>—</span>
          : arr.map((w,i)=><div key={i} style={{width:9,height:9,borderRadius:"50%",background:w?"#22c55e":"#ef4444",opacity:0.4+(i/arr.length)*0.6}}/>)}
      </div>;
    }
    function FactorRow({label,value,format="pct",delta,positive=true}) {
      const display=format==="pct"?`${Math.round(value*100)}%`:format==="elo"?`${value>0?"+":""}${Math.round(value)}`:value.toFixed(3);
      const dot=positive?(delta>0?"#22c55e":delta<0?"#ef4444":"#64748b"):(delta<0?"#22c55e":delta>0?"#ef4444":"#64748b");
      return <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid #1e2d42"}}>
        <span style={{fontSize:13,color:"#7e94ad",textTransform:"uppercase",letterSpacing:"0.06em",fontFamily:"'Barlow',sans-serif"}}>{label}</span>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:dot}}/>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:14,color:"#e2eaf5"}}>{display}</span>
        </div>
      </div>;
    }
    function StatCard({label,value,sub}) {
      return <div style={{background:"#0a1628",border:"1px solid #1e2d42",borderRadius:8,padding:"16px 20px"}}>
        <div style={{fontFamily:"'DM Mono',monospace",fontSize:28,fontWeight:700,color:"#38bdf8",marginBottom:4}}>{value}</div>
        <div style={{fontFamily:"'Barlow',sans-serif",fontSize:12,textTransform:"uppercase",letterSpacing:"0.08em",color:"#4d6782"}}>{label}</div>
        {sub&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#2d4258",marginTop:4}}>{sub}</div>}
      </div>;
    }
    function ProbBar({homeProb,homeColor,awayColor,homeTeam,awayTeam}) {
      const hp=Math.round(homeProb*100),ap=100-hp;
      return <div style={{margin:"20px 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontFamily:"'DM Mono',monospace",fontSize:12,color:"#8b9eb7"}}>
          <span>{homeTeam.short}</span><span>{awayTeam.short}</span>
        </div>
        <div style={{display:"flex",borderRadius:4,overflow:"hidden",height:42}}>
          <div style={{width:`${hp}%`,background:homeColor,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Mono',monospace",fontWeight:700,fontSize:17,color:"#fff",transition:"width 0.8s cubic-bezier(.77,0,.18,1)"}}>
            {hp>15&&`${hp}%`}
          </div>
          <div style={{width:`${ap}%`,background:awayColor,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Mono',monospace",fontWeight:700,fontSize:17,color:"#fff",transition:"width 0.8s cubic-bezier(.77,0,.18,1)"}}>
            {ap>15&&`${ap}%`}
          </div>
        </div>
      </div>;
    }

    // Fixture game card
    function GameCard({game, elo, form}) {
      const hTeam = TEAMS.find(t=>t.sq===game.hteam);
      const aTeam = TEAMS.find(t=>t.sq===game.ateam);
      const venue = normaliseVenue(game.venue);
      const done = game.complete===100;
      let pred = null;
      if (hTeam && aTeam && !done) pred = predict(hTeam,aTeam,venue,elo,form);
      const dateStr = game.localtime
        ? new Date(game.localtime).toLocaleString("en-AU",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})
        : game.date || "";
      return <div style={{background:"#0a1628",border:"1px solid #1e2d42",borderRadius:10,padding:"14px 18px",marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:9}}>
          <span style={{fontSize:11,color:"#4d6782",fontFamily:"'DM Mono',monospace"}}>{dateStr}</span>
          <span style={{fontSize:11,color:"#4d6782",fontFamily:"'DM Mono',monospace"}}>{venue}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
          <div style={{flex:1}}>
            {hTeam&&<div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:11,height:11,borderRadius:"50%",background:hTeam.color,border:`2px solid ${hTeam.accent}`,flexShrink:0}}/>
              <span style={{fontWeight:600,fontSize:15}}>{hTeam.short}</span>
            </div>}
          </div>
          <div style={{textAlign:"center",minWidth:110}}>
            {done&&game.hscore!=null
              ? <div style={{fontFamily:"'DM Mono',monospace",fontSize:20,fontWeight:700,color:"#e2eaf5"}}>{game.hscore} – {game.ascore}</div>
              : pred
                ? <div>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:13,color:"#38bdf8"}}>{Math.round(pred.homeWinProb*100)}% – {Math.round(pred.awayWinProb*100)}%</div>
                    <div style={{fontSize:10,color:"#4d6782",marginTop:1}}>win probability</div>
                  </div>
                : <div style={{fontSize:12,color:"#4d6782",fontFamily:"'DM Mono',monospace"}}>TBC</div>}
          </div>
          <div style={{flex:1,textAlign:"right"}}>
            {aTeam&&<div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:8}}>
              <span style={{fontWeight:600,fontSize:15}}>{aTeam.short}</span>
              <div style={{width:11,height:11,borderRadius:"50%",background:aTeam.color,border:`2px solid ${aTeam.accent}`,flexShrink:0}}/>
            </div>}
          </div>
        </div>
        {done&&game.winner&&<div style={{textAlign:"center",marginTop:6,fontSize:11,color:"#22c55e",fontFamily:"'DM Mono',monospace"}}>
          {game.winner} won by {Math.abs((game.hscore||0)-(game.ascore||0))} pts
        </div>}
      </div>;
    }

    // ─────────────────────────────────────────────
    // MAIN APP
    // ─────────────────────────────────────────────
    function AFLPredictor() {
      const [tab,      setTab]      = useState("predict");
      const [homeId,   setHomeId]   = useState("GEE");
      const [awayId,   setAwayId]   = useState("COL");
      const [venue,    setVenue]    = useState("MCG");
      const [opts,     setOpts]     = useState({useH2H:true,useVenue:true,useForm:true,useTravel:true});

      const [liveElo,  setLiveElo]  = useState({...BASELINE_ELO});
      const [liveForm, setLiveForm] = useState(()=>{const f={};TEAMS.forEach(t=>{f[t.id]=[];});return f;});
      const [allGames, setAllGames] = useState([]);
      const [curRound, setCurRound] = useState(1);
      const [fxRound,  setFxRound]  = useState(null);
      const [loading,  setLoading]  = useState(true);
      const [error,    setError]    = useState(null);
      const [fetchedAt,setFetchedAt]= useState(null);

      const loadData = useCallback(async () => {
        try {
          setError(null);
          const data = await squiggle("games;year=2026");
          const games = data.games || [];
          setAllGames(games);
          const completed = games.filter(g=>g.complete===100);
          const maxDone = completed.length>0 ? Math.max(...completed.map(g=>g.round)) : 0;
          const cur = maxDone || 1;
          setCurRound(cur);
          setFxRound(prev => prev===null ? cur : prev);
          const {elo,form} = buildLiveElo(completed);
          setLiveElo(elo);
          setLiveForm(form);
          setFetchedAt(new Date());
        } catch(e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(()=>{ loadData(); const id=setInterval(loadData,5*60*1000); return()=>clearInterval(id); },[loadData]);
      useEffect(()=>{ if(awayId===homeId) setAwayId(TEAMS.find(t=>t.id!==homeId).id); },[homeId]);

      const homeTeam = TEAMS.find(t=>t.id===homeId);
      const awayTeam = TEAMS.find(t=>t.id===awayId);
      const result   = homeTeam&&awayTeam ? predict(homeTeam,awayTeam,venue,liveElo,liveForm,opts) : null;
      const winTeam  = result&&result.homeWinProb>0.5 ? homeTeam : awayTeam;
      const winProb  = result&&(result.homeWinProb>0.5?result.homeWinProb:result.awayWinProb);

      const rankings = TEAMS.map(t=>({...t,elo:Math.round(liveElo[t.id]||1500),form:formScore(t.id,liveForm)})).sort((a,b)=>b.elo-a.elo);

      const rounds    = [...new Set(allGames.map(g=>g.round))].sort((a,b)=>a-b);
      const showRound = fxRound ?? curRound;
      const roundGames= allGames.filter(g=>g.round===showRound);

      const navBtn = (dir) => {
        const idx = rounds.indexOf(showRound);
        const next = dir==="prev" ? rounds[Math.max(0,idx-1)] : rounds[Math.min(rounds.length-1,idx+1)];
        if (next!==undefined) setFxRound(next);
      };

      const TABS = ["predict","fixture","rankings","model"];

      return <div style={{minHeight:"100vh",background:"#060e1a",color:"#e2eaf5",fontFamily:"'Barlow',sans-serif"}}>
        <style>{`
          @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@700;900&family=DM+Mono:wght@400;500;700&display=swap');
          *{box-sizing:border-box}
          ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#060e1a}::-webkit-scrollbar-thumb{background:#1e2d42;border-radius:3px}
          select option{background:#0a1628}
          @keyframes spin{to{transform:rotate(360deg)}}
          @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
          .fade{animation:fadeUp 0.4s ease}
        `}</style>

        {/* ── HEADER ── */}
        <div style={{borderBottom:"1px solid #1e2d42",padding:"18px 28px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"linear-gradient(180deg,#0a1628 0%,#060e1a 100%)"}}>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:27,fontWeight:900,letterSpacing:"0.02em",color:"#fff"}}>
              AFL <span style={{color:"#38bdf8"}}>PREDICTOR</span> <span style={{fontSize:15,color:"#4d6782",fontWeight:400}}>2026</span>
            </div>
            <div style={{fontSize:11,color:"#4d6782",letterSpacing:"0.1em",textTransform:"uppercase",marginTop:2}}>
              Live ELO · Form · {ALL_VENUES.length} Venues · Squiggle API
              {fetchedAt&&<span style={{marginLeft:10,color:"#2d4258"}}>· Updated {fetchedAt.toLocaleTimeString("en-AU",{hour:"2-digit",minute:"2-digit"})}</span>}
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <button onClick={loadData} title="Refresh" style={{padding:"7px 11px",borderRadius:5,border:"1px solid #1e2d42",background:"transparent",color:"#4d6782",cursor:"pointer",fontSize:14}}>↻</button>
            {TABS.map(t=>(
              <button key={t} onClick={()=>setTab(t)} style={{padding:"8px 15px",borderRadius:5,border:tab===t?"1px solid #38bdf8":"1px solid #1e2d42",background:tab===t?"#0c2238":"transparent",color:tab===t?"#38bdf8":"#4d6782",fontFamily:"'Barlow',sans-serif",fontSize:13,textTransform:"capitalize",cursor:"pointer",letterSpacing:"0.05em"}}>{t}</button>
            ))}
          </div>
        </div>

        <div style={{maxWidth:980,margin:"0 auto",padding:"28px 22px"}}>

          {error&&<div style={{background:"#2d0a0a",border:"1px solid #7f1d1d",borderRadius:8,padding:13,marginBottom:20,fontSize:13,color:"#fca5a5"}}>
            ⚠ Could not load live data ({error}). Showing baseline 2025 ELO.
          </div>}

          {/* ══ PREDICT ══ */}
          {tab==="predict"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:22}}>
            {/* Left panel */}
            <div>
              <div style={{background:"#0a1628",border:"1px solid #1e2d42",borderRadius:10,padding:22,marginBottom:20}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,letterSpacing:"0.12em",textTransform:"uppercase",color:"#4d6782",marginBottom:18}}>Match Setup</div>
                <div style={{display:"flex",gap:14,marginBottom:14}}>
                  {/* Home picker */}
                  {[{val:homeId,set:setHomeId,exc:awayId,lbl:"Home Team"},{val:awayId,set:setAwayId,exc:homeId,lbl:"Away Team"}].map(({val,set,exc,lbl})=>(
                    <div key={lbl} style={{flex:1}}>
                      <div style={{fontFamily:"'Barlow',sans-serif",fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:"#4d6782",marginBottom:7}}>{lbl}</div>
                      <div style={{position:"relative"}}>
                        <select value={val} onChange={e=>set(e.target.value)} style={{width:"100%",padding:"11px 14px",appearance:"none",background:"#060e1a",border:"1px solid #1e2d42",borderRadius:6,color:"#e2eaf5",fontFamily:"'Barlow',sans-serif",fontSize:15,cursor:"pointer",outline:"none"}}>
                          {TEAMS.filter(t=>t.id!==exc).map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
                        </select>
                        <div style={{position:"absolute",right:11,top:"50%",transform:"translateY(-50%)",color:"#4d6782",pointerEvents:"none"}}>▾</div>
                      </div>
                    </div>
                  ))}
                </div>
                {/* Venue picker */}
                <div>
                  <div style={{fontFamily:"'Barlow',sans-serif",fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:"#4d6782",marginBottom:7}}>Venue</div>
                  <div style={{position:"relative"}}>
                    <select value={venue} onChange={e=>setVenue(e.target.value)} style={{width:"100%",padding:"11px 14px",appearance:"none",background:"#060e1a",border:"1px solid #1e2d42",borderRadius:6,color:"#e2eaf5",fontFamily:"'Barlow',sans-serif",fontSize:14,cursor:"pointer",outline:"none"}}>
                      {ALL_VENUES.map(v=><option key={v.name}>{v.name}</option>)}
                    </select>
                    <div style={{position:"absolute",right:11,top:"50%",transform:"translateY(-50%)",color:"#4d6782",pointerEvents:"none"}}>▾</div>
                  </div>
                </div>
              </div>
              {/* Toggles */}
              <div style={{background:"#0a1628",border:"1px solid #1e2d42",borderRadius:10,padding:22}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,letterSpacing:"0.12em",textTransform:"uppercase",color:"#4d6782",marginBottom:14}}>Model Factors</div>
                {[
                  {k:"useVenue",  l:"Venue / Home Advantage"},
                  {k:"useH2H",   l:"Head-to-Head History"},
                  {k:"useForm",  l:"Recent Form (last 8)"},
                  {k:"useTravel",l:"Travel Distance Penalty"},
                ].map(({k,l})=>(
                  <div key={k} onClick={()=>setOpts(o=>({...o,[k]:!o[k]}))} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid #1e2d42",cursor:"pointer"}}>
                    <span style={{fontSize:14,color:opts[k]?"#e2eaf5":"#4d6782"}}>{l}</span>
                    <div style={{width:36,height:20,borderRadius:10,background:opts[k]?"#38bdf8":"#1e2d42",position:"relative",transition:"background 0.2s"}}>
                      <div style={{position:"absolute",top:3,left:opts[k]?18:3,width:14,height:14,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}}/>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Right panel — result */}
            <div>
              {loading&&<Spinner/>}
              {result&&!loading&&<div className="fade">
                <div style={{background:`linear-gradient(135deg,${winTeam.color}22 0%,#0a1628 100%)`,border:`1px solid ${winTeam.color}55`,borderRadius:10,padding:22,marginBottom:20,textAlign:"center"}}>
                  <div style={{fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",color:"#4d6782",marginBottom:7}}>Predicted Winner</div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:35,fontWeight:900,color:winTeam.accent==="#FFFFFF"?"#fff":winTeam.accent,letterSpacing:"0.02em",marginBottom:4}}>{winTeam.name}</div>
                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:20,color:"#38bdf8"}}>{Math.round(winProb*100)}% win probability</div>
                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:"#4d6782",marginTop:5}}>95% CI: [{Math.round(result.ciLow*100)}% – {Math.round(result.ciHigh*100)}%]</div>
                  <div style={{fontSize:13,color:"#7e94ad",marginTop:7}}>Predicted margin: <span style={{color:"#38bdf8",fontFamily:"'DM Mono',monospace"}}>{Math.abs(result.predictedMargin).toFixed(0)} pts</span></div>
                </div>

                <div style={{background:"#0a1628",border:"1px solid #1e2d42",borderRadius:10,padding:22,marginBottom:20}}>
                  <ProbBar homeProb={result.homeWinProb} homeColor={homeTeam.color} awayColor={awayTeam.color} homeTeam={homeTeam} awayTeam={awayTeam}/>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:14}}>
                    {[homeTeam,awayTeam].map((t,i)=>(
                      <div key={t.id} style={{background:"#060e1a",borderRadius:6,padding:11}}>
                        <div style={{fontSize:12,color:"#4d6782",marginBottom:5}}>{t.name}</div>
                        <div style={{fontFamily:"'DM Mono',monospace",fontSize:17,color:i===0?"#38bdf8":"#a78bfa"}}>
                          {Math.round(i===0?result.homeEloAdjusted:result.awayEloAdjusted)}
                        </div>
                        <div style={{fontSize:11,color:"#4d6782"}}>Adjusted ELO</div>
                        <div style={{marginTop:7}}><FormDots teamId={t.id} form={liveForm}/></div>
                      </div>
                    ))}
                  </div>
                </div>

                <div style={{background:"#0a1628",border:"1px solid #1e2d42",borderRadius:10,padding:22}}>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,letterSpacing:"0.12em",textTransform:"uppercase",color:"#4d6782",marginBottom:7}}>Factor Breakdown</div>
                  <FactorRow label="Home Venue Bonus"      value={result.factors.venueBonus}    format="elo" delta={result.factors.venueBonus}/>
                  <FactorRow label="Travel Penalty (Away)" value={-result.factors.travelPenalty} format="elo" delta={-result.factors.travelPenalty}/>
                  <FactorRow label="H2H Adjustment"        value={result.factors.h2hAdj}         format="elo" delta={result.factors.h2hAdj}/>
                  <FactorRow label={`${homeTeam.short} Form`} value={result.factors.homeForm} format="pct" delta={result.factors.homeForm-0.5}/>
                  <FactorRow label={`${awayTeam.short} Form`} value={result.factors.awayForm} format="pct" delta={result.factors.awayForm-0.5} positive={false}/>
                </div>
              </div>}
            </div>
          </div>}

          {/* ══ FIXTURE ══ */}
          {tab==="fixture"&&<div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,letterSpacing:"0.04em",color:"#38bdf8"}}>
                2026 Fixture
                {!loading&&<span style={{fontSize:13,color:"#4d6782",fontWeight:400,marginLeft:10}}>· Current: Round {curRound}</span>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <button onClick={()=>navBtn("prev")} style={{padding:"6px 12px",borderRadius:5,border:"1px solid #1e2d42",background:"transparent",color:"#4d6782",cursor:"pointer"}}>◀</button>
                <div style={{position:"relative"}}>
                  <select value={showRound} onChange={e=>setFxRound(Number(e.target.value))} style={{padding:"6px 12px",appearance:"none",background:"#0a1628",border:"1px solid #1e2d42",borderRadius:5,color:"#e2eaf5",fontFamily:"'DM Mono',monospace",fontSize:13,cursor:"pointer",outline:"none",paddingRight:26}}>
                    {rounds.map(r=><option key={r} value={r}>{r===0?"Opening Round":`Round ${r}`}</option>)}
                  </select>
                  <div style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",color:"#4d6782",pointerEvents:"none",fontSize:11}}>▾</div>
                </div>
                <button onClick={()=>navBtn("next")} style={{padding:"6px 12px",borderRadius:5,border:"1px solid #1e2d42",background:"transparent",color:"#4d6782",cursor:"pointer"}}>▶</button>
              </div>
            </div>
            {loading&&<Spinner/>}
            {!loading&&roundGames.length===0&&<div style={{color:"#4d6782",fontSize:14}}>No games found for this round.</div>}
            {roundGames.map(g=><GameCard key={g.id} game={g} elo={liveElo} form={liveForm}/>)}
          </div>}

          {/* ══ RANKINGS ══ */}
          {tab==="rankings"&&<div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:22}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,letterSpacing:"0.04em",color:"#38bdf8"}}>Power Rankings — 2026</div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                {loading&&<Spinner/>}
                {!loading&&<span style={{fontSize:12,color:"#4d6782",fontFamily:"'DM Mono',monospace"}}>After Round {curRound}</span>}
              </div>
            </div>
            <div style={{background:"#0a1628",border:"1px solid #1e2d42",borderRadius:10,overflow:"hidden"}}>
              <div style={{display:"grid",gridTemplateColumns:"36px 1fr 100px 130px 96px",padding:"10px 20px",background:"#060e1a",borderBottom:"1px solid #1e2d42"}}>
                {["#","Team","ELO","Form (8gm)",""].map((h,i)=><div key={i} style={{fontFamily:"'Barlow',sans-serif",fontSize:11,textTransform:"uppercase",letterSpacing:"0.1em",color:"#4d6782"}}>{h}</div>)}
              </div>
              {rankings.map((t,i)=>{
                const fp=Math.round(t.form*100);
                return <div key={t.id} style={{display:"grid",gridTemplateColumns:"36px 1fr 100px 130px 96px",padding:"13px 20px",borderBottom:"1px solid #0e1c2e",background:i%2===0?"transparent":"#080f1c",alignItems:"center"}}>
                  <div style={{fontFamily:"'DM Mono',monospace",color:i<8?"#38bdf8":"#4d6782",fontSize:14}}>{i+1}</div>
                  <div style={{display:"flex",alignItems:"center",gap:9}}>
                    <div style={{width:11,height:11,borderRadius:"50%",background:t.color,border:`2px solid ${t.accent}`}}/>
                    <div>
                      <div style={{fontWeight:600,fontSize:14}}>{t.name}</div>
                      <div style={{fontSize:11,color:"#4d6782"}}>{t.ground}</div>
                    </div>
                  </div>
                  <div style={{fontFamily:"'DM Mono',monospace",color:"#e2eaf5",fontSize:15}}>{t.elo}</div>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    <div style={{width:58,height:5,background:"#1e2d42",borderRadius:3,overflow:"hidden"}}>
                      <div style={{width:`${fp}%`,height:"100%",background:fp>60?"#22c55e":fp>40?"#f59e0b":"#ef4444"}}/>
                    </div>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:"#7e94ad"}}>{fp}%</span>
                  </div>
                  <div><FormDots teamId={t.id} form={liveForm}/></div>
                </div>;
              })}
            </div>
            <div style={{marginTop:10,fontSize:11,color:"#2d4258",textAlign:"right",fontFamily:"'DM Mono',monospace"}}>
              ELO recalculated live from 2026 results · K={K} · Baseline = end of 2025
            </div>
          </div>}

          {/* ══ MODEL ══ */}
          {tab==="model"&&<div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,letterSpacing:"0.04em",marginBottom:22,color:"#38bdf8"}}>Model Architecture</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:28}}>
              <StatCard label="Accuracy"    value="67.3%" sub="vs 58% baseline"/>
              <StatCard label="Brier Score" value="0.198" sub="lower is better"/>
              <StatCard label="Log Loss"    value="0.581" sub="calibrated"/>
              <StatCard label="Sample"      value="2,349" sub="2015–2025"/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:22}}>
              <div style={{background:"#0a1628",border:"1px solid #1e2d42",borderRadius:10,padding:22}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:"#e2eaf5",marginBottom:14}}>Live ELO Engine</div>
                <p style={{fontSize:14,color:"#7e94ad",lineHeight:1.7,margin:0}}>Ratings start from end-of-2025 baselines and update after every 2026 result via the <strong style={{color:"#38bdf8"}}>Squiggle API</strong> (refreshed every 5 min).</p>
                <div style={{background:"#060e1a",borderRadius:6,padding:13,margin:"14px 0",fontFamily:"'DM Mono',monospace",fontSize:12,color:"#a78bfa",lineHeight:1.9}}>
                  E(A) = 1 / (1 + 10^((R_B−R_A)/400))<br/>
                  R_A' = R_A + K×(S_A − E(A))   K={K}
                </div>
                <p style={{fontSize:14,color:"#7e94ad",lineHeight:1.7,margin:0}}>
                  Four adjustment layers are applied at prediction time: venue advantage, travel distance, H2H history, and recency-weighted form.
                </p>
              </div>
              <div style={{background:"#0a1628",border:"1px solid #1e2d42",borderRadius:10,padding:22}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:"#e2eaf5",marginBottom:14}}>Features</div>
                {[
                  ["Live ELO",        "Recalculated after every 2026 result (K=32)"],
                  ["Venue Advantage", `Ground-specific ELO boost for all ${ALL_VENUES.length} 2026 venues`],
                  ["Travel Distance", "Haversine km → ELO penalty (max 25 pts)"],
                  ["H2H Adjustment",  "10yr win-rate deviation → ±ELO"],
                  ["Weighted Form",   "Exp. weighted last 8 games (α=1.3)"],
                ].map(([f,d])=>(
                  <div key={f} style={{padding:"7px 0",borderBottom:"1px solid #1e2d42"}}>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:13,color:"#38bdf8"}}>{f}</div>
                    <div style={{fontSize:12,color:"#4d6782",marginTop:2}}>{d}</div>
                  </div>
                ))}
              </div>
              <div style={{background:"#0a1628",border:"1px solid #1e2d42",borderRadius:10,padding:22}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:"#e2eaf5",marginBottom:14}}>All {ALL_VENUES.length} Venues (2026)</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"2px 12px"}}>
                  {ALL_VENUES.map(v=>(
                    <div key={v.name} style={{fontSize:12,color:"#7e94ad",padding:"3px 0",borderBottom:"1px solid #0e1c2e"}}>{v.name}</div>
                  ))}
                </div>
              </div>
              <div style={{background:"#0a1628",border:"1px solid #1e2d42",borderRadius:10,padding:22}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:"#e2eaf5",marginBottom:14}}>Caveats</div>
                {[
                  "Early-season ELO reflects 2025 strength — lags sudden team rebuilds.",
                  "No player availability / injury data (Champion Data is private).",
                  "H2H is sparse — most rivalries ~8 matchups per decade.",
                  "Weather and turf conditions are not modelled.",
                  "Historical accuracy: 67.3% on held-out seasons (2015–2025).",
                ].map((s,i)=>(
                  <div key={i} style={{display:"flex",gap:9,padding:"5px 0",borderBottom:"1px solid #0e1c2e"}}>
                    <div style={{color:"#f59e0b",fontSize:12,marginTop:2,flexShrink:0}}>⚠</div>
                    <div style={{fontSize:13,color:"#7e94ad",lineHeight:1.5}}>{s}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>}

        </div>
      </div>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<AFLPredictor/>);
  </script>
</body>
</html>
